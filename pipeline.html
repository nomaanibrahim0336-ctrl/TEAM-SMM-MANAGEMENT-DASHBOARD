<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMM-MANAGER — Pipeline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body class="bg-gray-950 text-gray-100 font-sans">

  <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-gray-900 border-r border-gray-800 flex flex-col z-50"></div>

  <!-- MAIN -->
  <div class="ml-64 min-h-screen flex flex-col">
    <header class="sticky top-0 z-40 bg-gray-950/80 backdrop-blur border-b border-gray-800 px-8 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold text-white">Pipeline</h1>
        <p class="text-xs text-gray-500 mt-0.5">Drag & drop tasks through the content workflow</p>
      </div>
      <div class="flex items-center gap-3">
        <select id="pipelineFilter" class="form-input w-auto text-sm py-2" onchange="renderBoard()">
          <option value="">All Clients</option>
        </select>
        <div id="newTaskBtnWrap"></div>
      </div>
    </header>

    <main class="flex-1 px-6 py-6 overflow-x-auto">
      <div id="kanbanBoard" class="flex gap-4 min-w-max pb-4"></div>
    </main>
  </div>

  <!-- TASK DETAIL MODAL -->
  <div id="taskDetailModal" class="modal-overlay" onclick="if(event.target===this)closeTaskDetail()">
    <div class="modal-box" style="max-width:620px">
      <div class="flex items-center justify-between px-6 py-5 border-b border-gray-800">
        <h2 class="text-base font-semibold text-white" id="taskDetailTitle">Task Details</h2>
        <button onclick="closeTaskDetail()" class="text-gray-500 hover:text-gray-300"><i class="fa-solid fa-xmark text-lg"></i></button>
      </div>
      <div class="p-6" id="taskDetailBody"></div>
    </div>
  </div>

  <!-- NEW TASK MODAL -->
  <div id="taskModal" class="modal-overlay" onclick="if(event.target===this)closeTaskModal()">
    <div class="modal-box">
      <div class="flex items-center justify-between px-6 py-5 border-b border-gray-800">
        <h2 class="text-base font-semibold text-white">New Content Task</h2>
        <button onclick="closeTaskModal()" class="text-gray-500 hover:text-gray-300"><i class="fa-solid fa-xmark text-lg"></i></button>
      </div>
      <div class="p-6 space-y-4">
        <div>
          <label class="form-label">Client *</label>
          <select id="taskClient" class="form-input" onchange="onClientSelect()">
            <option value="">Select Client</option>
          </select>
        </div>
        <div id="clientInfoBanner" class="hidden bg-indigo-500/10 border border-indigo-500/20 rounded-lg p-3">
          <p class="text-xs text-indigo-300" id="clientInfoText"></p>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="form-label">Content Type *</label>
            <select id="taskType" class="form-input">
              <option value="carousel">Carousel</option>
              <option value="video">Video Post</option>
              <option value="stories">Story Pack</option>
              <option value="reels">Reels</option>
              <option value="post">Single Post</option>
            </select>
          </div>
          <div>
            <label class="form-label">Platform</label>
            <select id="taskPlatform" class="form-input">
              <option value="instagram">Instagram</option>
              <option value="facebook">Facebook</option>
              <option value="both">Both</option>
            </select>
          </div>
        </div>
        <div>
          <label class="form-label">Topic / Title *</label>
          <input id="taskTopic" type="text" class="form-input" placeholder="e.g. Summer Collection Launch"/>
        </div>
        <div>
          <label class="form-label">Content Brief</label>
          <textarea id="taskBrief" class="form-input" rows="2" placeholder="Describe the content..."></textarea>
        </div>
        <div>
          <label class="form-label">Special Instructions</label>
          <textarea id="taskInstructions" class="form-input" rows="2" placeholder="Notes for creator/designer..."></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="form-label">Due Date *</label>
            <input id="taskDue" type="date" class="form-input"/>
          </div>
          <div>
            <label class="form-label">Priority</label>
            <select id="taskPriority" class="form-input">
              <option value="high">🔴 High</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="low">🟢 Low</option>
            </select>
          </div>
        </div>
      </div>
      <div class="flex justify-end gap-3 px-6 py-4 border-t border-gray-800">
        <button onclick="closeTaskModal()" class="btn-secondary">Cancel</button>
        <button onclick="saveTask()" class="btn-primary">Create Task</button>
      </div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script>
    const COLUMNS = [
      { id: 'new',               label: 'New',                  color: 'bg-blue-500',    dot: 'bg-blue-400' },
      { id: 'ready_to_designer', label: 'Ready to Designer',    color: 'bg-violet-500',  dot: 'bg-violet-400' },
      { id: 'with_designer',     label: 'With Designer',        color: 'bg-purple-500',  dot: 'bg-purple-400' },
      { id: 'pending_review',    label: 'Pending Review',       color: 'bg-yellow-500',  dot: 'bg-yellow-400' },
      { id: 'changes_requested', label: 'Changes Requested',    color: 'bg-red-500',     dot: 'bg-red-400' },
      { id: 'ready_to_post',     label: 'Ready to Post',        color: 'bg-green-500',   dot: 'bg-green-400' },
      { id: 'posted',            label: 'Posted',               color: 'bg-emerald-500', dot: 'bg-emerald-400' },
    ];

    const TYPE_ICONS = { carousel:'fa-table-cells', video:'fa-film', stories:'fa-mobile-screen', reels:'fa-clapperboard', post:'fa-image' };
    const PRIORITY_COLORS = { high:'text-red-400', medium:'text-yellow-400', low:'text-green-400' };

    let draggedId = null;

    function renderBoard() {
      const filterClient = document.getElementById('pipelineFilter').value;
      const base = window._visibleTasks || APP.tasks;
      const tasks = base.filter(t => !filterClient || t.clientId === filterClient);
      const board = document.getElementById('kanbanBoard');
      board.innerHTML = COLUMNS.map(col => {
        const colTasks = tasks.filter(t => t.status === col.id);
        return `
          <div class="kanban-col w-64" data-col="${col.id}"
            ondragover="event.preventDefault();this.classList.add('drag-over')"
            ondragleave="this.classList.remove('drag-over')"
            ondrop="onDrop(event,'${col.id}')">
            <div class="kanban-col-header">
              <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full ${col.dot}"></span>
                <span class="text-sm font-semibold text-white">${col.label}</span>
              </div>
              <span class="text-xs font-bold text-gray-500 bg-gray-800 px-2 py-0.5 rounded-full">${colTasks.length}</span>
            </div>
            <div class="space-y-0">
              ${colTasks.map(t => taskCard(t)).join('')}
              ${colTasks.length === 0 ? `<div class="text-center py-8 text-gray-700 text-xs">Drop tasks here</div>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    function taskCard(t) {
      const due = daysUntil(t.dueDate);
      const dueLabel = due < 0 ? `<span class="text-red-400 text-xs">Overdue ${Math.abs(due)}d</span>` :
                       due === 0 ? `<span class="text-orange-400 text-xs">Due today</span>` :
                       `<span class="text-gray-500 text-xs">Due in ${due}d</span>`;
      const icon = TYPE_ICONS[t.contentType] || 'fa-file';
      const pColor = PRIORITY_COLORS[t.priority] || 'text-gray-400';
      return `
        <div class="kanban-card fade-in" draggable="true"
          ondragstart="draggedId='${t.id}';this.classList.add('dragging')"
          ondragend="this.classList.remove('dragging')"
          onclick="viewTask('${t.id}')">
          <div class="flex items-start justify-between gap-2 mb-2">
            <div class="flex items-center gap-2">
              <div class="w-7 h-7 rounded-lg bg-gray-700 flex items-center justify-center flex-shrink-0">
                <i class="fa-solid ${icon} text-gray-400 text-xs"></i>
              </div>
              <span class="text-sm font-semibold text-white leading-tight">${t.clientName}</span>
            </div>
            <i class="fa-solid fa-circle ${pColor} text-xs mt-1 flex-shrink-0" title="${t.priority} priority"></i>
          </div>
          <p class="text-xs text-gray-400 mb-3 pl-9 truncate">${t.topic}</p>
          <div class="flex items-center justify-between pl-0">
            <span class="text-xs text-gray-600 capitalize">${t.contentType}</span>
            ${dueLabel}
          </div>
          ${t.comments?.length ? `<div class="mt-2 pl-0 flex items-center gap-1 text-xs text-gray-600"><i class="fa-solid fa-comment text-xs"></i> ${t.comments.length}</div>` : ''}
        </div>`;
    }

    function onDrop(e, newStatus) {
      e.preventDefault();
      document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over'));
      if (!draggedId) return;
      const task = APP.tasks.find(t => t.id === draggedId);
      if (task && task.status !== newStatus) {
        task.status = newStatus;
        task.timeline = task.timeline || [];
        const dropLabel = `Moved to ${COLUMNS.find(c=>c.id===newStatus)?.label}`;
        task.timeline.push({ action: dropLabel, by: 'You', date: new Date().toISOString().split('T')[0] });
        saveData(); apiUpdateTask(task.id, { status: newStatus, timeline_action: dropLabel });
        renderBoard();
      }
      draggedId = null;
    }

    function viewTask(id) {
      const t = APP.tasks.find(t => t.id === id);
      if (!t) return;
      document.getElementById('taskDetailTitle').textContent = `${t.clientName} — ${t.contentType}`;
      document.getElementById('taskDetailBody').innerHTML = `
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-3">
            <div class="bg-gray-800 rounded-xl p-4 space-y-2">
              <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-2">Task Info</p>
              <div class="flex justify-between"><span class="text-xs text-gray-500">Status</span>${statusBadge(t.status)}</div>
              <div class="flex justify-between"><span class="text-xs text-gray-500">Priority</span><span class="text-sm ${PRIORITY_COLORS[t.priority]} font-medium capitalize">${t.priority}</span></div>
              <div class="flex justify-between"><span class="text-xs text-gray-500">Type</span><span class="text-sm text-white capitalize">${t.contentType}</span></div>
              <div class="flex justify-between"><span class="text-xs text-gray-500">Platform</span><span class="text-sm text-white capitalize">${t.platform}</span></div>
              <div class="flex justify-between"><span class="text-xs text-gray-500">Due</span><span class="text-sm text-white">${formatDate(t.dueDate)}</span></div>
            </div>
            <div class="bg-gray-800 rounded-xl p-4 space-y-2">
              <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-2">Team</p>
              <div class="flex justify-between"><span class="text-xs text-gray-500">Created by</span><span class="text-sm text-white">${t.createdBy}</span></div>
              ${t.postedDate ? `<div class="flex justify-between"><span class="text-xs text-gray-500">Posted Date</span><span class="text-sm text-green-400 font-medium">${formatDate(t.postedDate)}${t.postedTime ? ' at ' + t.postedTime : ''}</span></div>` : ''}
              ${t.postedNote ? `<div class="flex justify-between"><span class="text-xs text-gray-500">Post Note</span><span class="text-sm text-gray-300">${t.postedNote}</span></div>` : ''}
              <div class="flex justify-between"><span class="text-xs text-gray-500">Creator</span><span class="text-sm text-white">${t.assignedTo}</span></div>
              <div class="flex justify-between"><span class="text-xs text-gray-500">Designer</span><span class="text-sm text-white">${t.designer}</span></div>
              <div class="flex justify-between"><span class="text-xs text-gray-500">Created</span><span class="text-sm text-white">${formatDate(t.createdDate)}</span></div>
            </div>
          </div>
          ${t.brief ? `<div class="bg-gray-800 rounded-xl p-4"><p class="text-xs text-gray-500 mb-1">Brief</p><p class="text-sm text-gray-300">${t.brief}</p></div>` : ''}
          ${t.instructions ? `<div class="bg-gray-800 rounded-xl p-4"><p class="text-xs text-gray-500 mb-1">Instructions</p><p class="text-sm text-gray-300">${t.instructions}</p></div>` : ''}

          <!-- Move Stage -->
          <div class="bg-gray-800 rounded-xl p-4">
            <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-3">Move to Stage</p>
            <div class="flex flex-wrap gap-2">
              ${COLUMNS.filter(c=>c.id!==t.status).map(c=>`
                <button onclick="moveTask('${t.id}','${c.id}')" class="text-xs bg-gray-700 hover:bg-gray-600 text-gray-300 px-3 py-1.5 rounded-lg transition-colors">
                  <span class="w-2 h-2 rounded-full ${c.dot} inline-block mr-1.5"></span>${c.label}
                </button>`).join('')}
            </div>
          </div>

          <!-- Activity Timeline -->
          <div class="bg-gray-800 rounded-xl p-4">
            <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-3">Activity Log</p>
            <div class="space-y-0">
              ${(t.timeline||[]).map((e,i)=>`
                <div class="timeline-item">
                  <div class="timeline-dot bg-indigo-500/20 text-indigo-400"><i class="fa-solid fa-circle-dot text-xs"></i></div>
                  <div>
                    <p class="text-sm text-white">${e.action}</p>
                    <p class="text-xs text-gray-500">${e.by} · ${formatDate(e.date)}</p>
                  </div>
                </div>`).join('')}
            </div>
          </div>

          <!-- Comments -->
          <div class="bg-gray-800 rounded-xl p-4">
            <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-3">Comments</p>
            <div id="commentsList" class="space-y-2 mb-3">
              ${(t.comments||[]).map(c=>`
                <div class="flex gap-3">
                  <div class="avatar bg-indigo-700 text-xs">${c.by[0]}</div>
                  <div class="flex-1 bg-gray-700 rounded-lg px-3 py-2">
                    <p class="text-xs font-semibold text-white">${c.by}</p>
                    <p class="text-sm text-gray-300 mt-0.5">${c.text}</p>
                    <p class="text-xs text-gray-600 mt-1">${formatDate(c.date)}</p>
                  </div>
                </div>`).join('')}
              ${!t.comments?.length ? `<p class="text-xs text-gray-600">No comments yet</p>` : ''}
            </div>
            <div class="flex gap-2">
              <input id="newComment" type="text" class="form-input flex-1 text-sm py-2" placeholder="Add a comment..."/>
              <button onclick="addComment('${t.id}')" class="btn-primary px-4 py-2 text-sm">Post</button>
            </div>
          </div>
        </div>`;
      document.getElementById('taskDetailModal').classList.add('open');
    }

    function moveTask(taskId, newStatus) {
      const task = APP.tasks.find(t => t.id === taskId);
      if (!task) return;

      if (newStatus === 'posted') {
        showPostedDateModal(taskId, (date, scheduledTill, note) => {
          task.status = 'posted';
          task.postedDate = date;
          task.scheduledTill = scheduledTill;
          task.postedNote = note;
          task.timeline = task.timeline || [];
          const label = `Posted on ${formatDate(date)}` + (scheduledTill ? ` — Scheduled till: ${formatDate(scheduledTill)}` : '');
          task.timeline.push({ action: label + (note ? ` — ${note}` : ''), by: 'You', date });
          saveData(); apiUpdateTask(task.id, { status:'posted', posted_date: date, scheduled_till: scheduledTill, timeline_action: label + (note ? ` — ${note}` : '') });
          renderBoard(); closeTaskDetail();
          showToast('Task marked as Posted!');
        });
        return;
      }

      if (newStatus === 'changes_requested') {
        showChangesModal(taskId, () => { saveData(); renderBoard(); closeTaskDetail(); });
        return;
      }

      task.status = newStatus;
      task.timeline = task.timeline || [];
      const moveLabel2 = `Moved to ${COLUMNS.find(c=>c.id===newStatus)?.label}`;
      task.timeline.push({ action: moveLabel2, by: 'You', date: new Date().toISOString().split('T')[0] });
      saveData(); apiUpdateTask(task.id, { status: newStatus, timeline_action: moveLabel2 }); renderBoard(); closeTaskDetail();
    }

    function showChangesModal(taskId, onDone) {
      const existing = document.getElementById('changesModal');
      if (existing) existing.remove();
      const modal = document.createElement('div');
      modal.id = 'changesModal';
      modal.className = 'modal-overlay open';
      modal.innerHTML = `
        <div class="modal-box" style="max-width:460px">
          <div class="flex items-center justify-between px-6 py-5 border-b border-gray-800">
            <div>
              <h2 class="text-base font-semibold text-white">Request Changes</h2>
              <p class="text-xs text-gray-500 mt-0.5">Describe what needs to be changed</p>
            </div>
            <button onclick="document.getElementById('changesModal').remove()" class="text-gray-500 hover:text-gray-300"><i class="fa-solid fa-xmark text-lg"></i></button>
          </div>
          <div class="p-6 space-y-4">
            <textarea id="changesNote" class="form-input" rows="4" placeholder="e.g. Change the audio, adjust colours, redo the caption..."></textarea>
            <div class="flex gap-3 justify-end">
              <button onclick="document.getElementById('changesModal').remove()" class="btn-secondary text-sm">Cancel</button>
              <button onclick="confirmChanges('${taskId}')" class="btn-primary text-sm"><i class="fa-solid fa-flag mr-2 text-xs"></i>Request Changes</button>
            </div>
          </div>
        </div>`;
      document.body.appendChild(modal);
      modal.querySelector('#changesNote').focus();
      window._changesCallback = onDone;
    }

    function confirmChanges(taskId) {
      const note = document.getElementById('changesNote').value.trim();
      if (!note) { showToast('Please describe what needs to change.', 'error'); return; }
      const task = APP.tasks.find(t => t.id === taskId);
      if (!task) return;
      const today = new Date().toISOString().split('T')[0];
      const user = APP.currentUser;
      task.status = 'changes_requested';
      task.comments = task.comments || [];
      task.comments.push({ by: user ? user.name : 'You', text: note, date: today, type: 'change_request' });
      task.timeline = task.timeline || [];
      task.timeline.push({ action: `Changes requested: "${note}"`, by: user ? user.name : 'You', date: today });
      apiUpdateTask(task.id, { status:'changes_requested', changes_requested: true, change_note: note, timeline_action: `Changes requested: "${note}"` });
      document.getElementById('changesModal').remove();
      if (window._changesCallback) window._changesCallback();
      showToast('Changes requested and logged.');
    }

    function addComment(taskId) {
      const input = document.getElementById('newComment');
      const text = input.value.trim();
      if (!text) return;
      const task = APP.tasks.find(t => t.id === taskId);
      if (!task) return;
      task.comments = task.comments || [];
      task.comments.push({ by: 'You', text, date: new Date().toISOString().split('T')[0] });
      saveData(); input.value = '';
      viewTask(taskId);
    }

    function closeTaskDetail() { document.getElementById('taskDetailModal').classList.remove('open'); }

    function openTaskModal() { document.getElementById('taskModal').classList.add('open'); }
    function closeTaskModal() { document.getElementById('taskModal').classList.remove('open'); }

    function onClientSelect() {
      const sel = document.getElementById('taskClient');
      const c = APP.clients.find(c => c.id === sel.value);
      const banner = document.getElementById('clientInfoBanner');
      const info = document.getElementById('clientInfoText');
      if (c) {
        banner.classList.remove('hidden');
        info.textContent = `Lead: ${c.pm||'—'} · Executive: ${c.executive||'—'} · Designer: ${c.designer||'—'} · Budget: PKR ${(c.budget||0).toLocaleString()} · Ends: ${formatDate(c.endDate)}`;
      } else { banner.classList.add('hidden'); }
    }

    function saveTask() {
      const currentUser = APP.currentUser;
      const clientId = document.getElementById('taskClient').value;
      const client = APP.clients.find(c => c.id === clientId);
      const topic = document.getElementById('taskTopic').value.trim();
      const due = document.getElementById('taskDue').value;
      if (!clientId) { showToast('Please select a client.', 'error'); return; }
      const task = {
        id: 't' + Date.now(),
        clientId,
        clientName: client.name,
        contentType: document.getElementById('taskType').value,
        platform: document.getElementById('taskPlatform').value,
        topic,
        title: topic,
        brief: document.getElementById('taskBrief').value.trim(),
        instructions: document.getElementById('taskInstructions').value.trim(),
        dueDate: due,
        priority: document.getElementById('taskPriority').value,
        status: 'new',
        createdBy: currentUser ? currentUser.name : 'You',
        assignedTo: client.executive || client.pm || '',
        designer: client.designer || '',
        createdDate: new Date().toISOString().split('T')[0],
        comments: [],
        timeline: [{ action: 'Task created', by: currentUser ? currentUser.name : 'You', date: new Date().toISOString().split('T')[0] }],
      };
      APP.tasks.push(task);
      saveData(); apiSaveTask(task); renderBoard(); closeTaskModal();
      showToast('Task created successfully!');
    }

    function populateClientFilter() {
      const sel  = document.getElementById('pipelineFilter');
      const sel2 = document.getElementById('taskClient');
      const pVal = sel.value;
      sel.innerHTML  = '<option value="">All Clients</option>';
      sel2.innerHTML = '<option value="">Select Client</option>';
      APP.clients.forEach(c => {
        sel.innerHTML  += `<option value="${c.id}">${c.name}</option>`;
        sel2.innerHTML += `<option value="${c.id}">${c.name}</option>`;
      });
      if (pVal) sel.value = pVal;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const user = pageInit();
      if (!user) return;
      // Only PM/Admin see New Task button
      if (can('create_task', user)) {
        document.getElementById('newTaskBtnWrap').innerHTML = `
          <button onclick="openTaskModal()" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
            <i class="fa-solid fa-plus text-xs"></i> New Task
          </button>`;
      }
      window._visibleTasks = getVisibleTasks(APP.tasks, user);
      populateClientFilter();
      renderBoard();
      document.addEventListener('smm:synced', () => { window._visibleTasks = getVisibleTasks(APP.tasks, user); populateClientFilter(); renderBoard(); });
    });
  </script>
</body>
</html>
