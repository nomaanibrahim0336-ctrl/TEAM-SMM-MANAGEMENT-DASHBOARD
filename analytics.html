<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMM-MANAGER — Analytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body class="bg-gray-950 text-gray-100 font-sans">
  <div class="fixed top-0 left-0 h-full w-64 bg-gray-900 border-r border-gray-800 flex flex-col z-50">
    <div class="flex items-center gap-3 px-6 py-5 border-b border-gray-800">
      <div class="w-9 h-9 rounded-lg bg-indigo-600 flex items-center justify-center"><i class="fa-solid fa-layer-group text-white text-sm"></i></div>
      <span class="text-white font-bold text-lg tracking-wide">SMM-MANAGER</span>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      <a href="index.html" class="nav-link"><i class="fa-solid fa-gauge-high w-5"></i><span>Dashboard</span></a>
      <a href="clients.html" class="nav-link"><i class="fa-solid fa-users w-5"></i><span>Clients</span></a>
      <a href="pipeline.html" class="nav-link"><i class="fa-solid fa-kanban w-5"></i><span>Pipeline</span></a>
      <a href="tasks.html" class="nav-link"><i class="fa-solid fa-list-check w-5"></i><span>Tasks</span></a>
      <a href="team.html" class="nav-link"><i class="fa-solid fa-people-group w-5"></i><span>Team</span></a>
      <a href="analytics.html" class="nav-link active"><i class="fa-solid fa-chart-line w-5"></i><span>Analytics</span></a>
      <div class="pt-4 pb-1 px-3"><p class="text-xs text-gray-600 uppercase tracking-widest font-semibold">Admin</p></div>
      <a href="admin.html" class="nav-link"><i class="fa-solid fa-shield-halved w-5"></i><span>Admin Panel</span></a>
      <a href="settings.html" class="nav-link"><i class="fa-solid fa-gear w-5"></i><span>Settings</span></a>
    </nav>
    <div class="px-4 py-4 border-t border-gray-800">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-full bg-indigo-700 flex items-center justify-center text-sm font-bold">A</div>
        <div class="flex-1 min-w-0"><p class="text-sm font-semibold text-white truncate">Admin</p><p class="text-xs text-gray-500 truncate">admin@smm.com</p></div>
        <a href="login.html" class="text-gray-500 hover:text-red-400 transition-colors"><i class="fa-solid fa-right-from-bracket text-sm"></i></a>
      </div>
    </div>
  </div>

  <div class="ml-64 min-h-screen flex flex-col">
    <header class="sticky top-0 z-40 bg-gray-950/80 backdrop-blur border-b border-gray-800 px-8 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold text-white">Analytics</h1>
        <p class="text-xs text-gray-500 mt-0.5">Performance overview & pipeline insights</p>
      </div>
      <span class="text-xs text-gray-500 bg-gray-800 px-3 py-1.5 rounded-full" id="currentDate"></span>
    </header>

    <main class="flex-1 px-8 py-6 space-y-6" id="analyticsMain"></main>
  </div>

  <script src="assets/js/app.js"></script>
  <script>
    function render() {
      const tasks = APP.tasks;
      const clients = APP.clients;
      const total = tasks.length;
      const posted = tasks.filter(t => t.status === 'posted').length;
      const active = tasks.filter(t => t.status !== 'posted').length;
      const changes = tasks.filter(t => t.status === 'changes_requested').length;
      const onHold = tasks.filter(t => t.status === 'on_hold').length;
      const completionRate = total ? Math.round((posted / total) * 100) : 0;
      const totalBudget = clients.reduce((s, c) => s + (c.budget || 0), 0);
      const activeClients = clients.filter(c => {
        const days = daysUntil(c.endDate);
        return c.status === 'active' && days >= 0;
      }).length;
      const endingSoon = clients.filter(c => { const d = daysUntil(c.endDate); return d >= 0 && d <= 30; }).length;

      // content type breakdown
      const typeCount = {};
      tasks.forEach(t => { typeCount[t.contentType] = (typeCount[t.contentType] || 0) + 1; });
      const maxType = Math.max(...Object.values(typeCount), 1);

      // status breakdown
      const statusCount = {};
      tasks.forEach(t => { statusCount[t.status] = (statusCount[t.status] || 0) + 1; });

      // top clients by task count
      const clientTasks = {};
      tasks.forEach(t => { clientTasks[t.clientName] = (clientTasks[t.clientName] || 0) + 1; });
      const topClients = Object.entries(clientTasks).sort((a,b)=>b[1]-a[1]).slice(0,5);
      const maxClientTasks = topClients[0]?.[1] || 1;

      document.getElementById('analyticsMain').innerHTML = `
        <!-- KPI Row -->
        <div class="grid grid-cols-5 gap-4">
          <div class="stat-card border-l-indigo-500">
            <p class="text-xs text-gray-500 uppercase tracking-wider mb-2">Total Tasks</p>
            <p class="text-3xl font-bold text-white">${total}</p>
            <p class="text-xs text-gray-600 mt-1">All time</p>
          </div>
          <div class="stat-card border-l-green-500">
            <p class="text-xs text-gray-500 uppercase tracking-wider mb-2">Posted</p>
            <p class="text-3xl font-bold text-white">${posted}</p>
            <p class="text-xs text-green-400 mt-1">${completionRate}% rate</p>
          </div>
          <div class="stat-card border-l-yellow-500">
            <p class="text-xs text-gray-500 uppercase tracking-wider mb-2">In Pipeline</p>
            <p class="text-3xl font-bold text-white">${active}</p>
            <p class="text-xs text-yellow-400 mt-1">Active now</p>
          </div>
          <div class="stat-card border-l-red-500">
            <p class="text-xs text-gray-500 uppercase tracking-wider mb-2">Changes Req.</p>
            <p class="text-3xl font-bold text-white">${changes}</p>
            <p class="text-xs text-red-400 mt-1">Need attention</p>
          </div>
          <div class="stat-card border-l-blue-500">
            <p class="text-xs text-gray-500 uppercase tracking-wider mb-2">Active Clients</p>
            <p class="text-3xl font-bold text-white">${activeClients}</p>
            <p class="text-xs ${endingSoon > 0 ? 'text-orange-400' : 'text-gray-600'} mt-1">${endingSoon} ending soon</p>
          </div>
        </div>

        <div class="grid grid-cols-3 gap-4">
          <!-- Completion Rate -->
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
            <h2 class="text-sm font-semibold text-white mb-4">Completion Rate</h2>
            <div class="flex items-center justify-center py-4">
              <div class="relative w-32 h-32">
                <svg viewBox="0 0 36 36" class="w-32 h-32 -rotate-90">
                  <circle cx="18" cy="18" r="15.9" fill="none" stroke="#1F2937" stroke-width="3"/>
                  <circle cx="18" cy="18" r="15.9" fill="none" stroke="#6366F1" stroke-width="3"
                    stroke-dasharray="${completionRate} ${100 - completionRate}" stroke-linecap="round"/>
                </svg>
                <div class="absolute inset-0 flex items-center justify-center flex-col">
                  <span class="text-2xl font-bold text-white">${completionRate}%</span>
                  <span class="text-xs text-gray-500">complete</span>
                </div>
              </div>
            </div>
            <div class="space-y-2 mt-2">
              <div class="flex justify-between items-center">
                <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-indigo-500"></span><span class="text-xs text-gray-400">Posted</span></div>
                <span class="text-sm font-semibold text-white">${posted}</span>
              </div>
              <div class="flex justify-between items-center">
                <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-gray-600"></span><span class="text-xs text-gray-400">In Progress</span></div>
                <span class="text-sm font-semibold text-white">${active}</span>
              </div>
            </div>
          </div>

          <!-- Content Type Breakdown -->
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
            <h2 class="text-sm font-semibold text-white mb-4">Content Types</h2>
            <div class="space-y-3">
              ${Object.entries(typeCount).map(([type, count]) => `
                <div>
                  <div class="flex justify-between mb-1">
                    <span class="text-xs text-gray-400 capitalize">${type}</span>
                    <span class="text-xs font-semibold text-white">${count}</span>
                  </div>
                  <div class="w-full bg-gray-800 rounded-full h-1.5">
                    <div class="bg-indigo-500 h-1.5 rounded-full transition-all" style="width:${Math.round((count/maxType)*100)}%"></div>
                  </div>
                </div>`).join('')}
            </div>
          </div>

          <!-- Budget Overview -->
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
            <h2 class="text-sm font-semibold text-white mb-4">Budget Overview</h2>
            <div class="space-y-3">
              <div class="text-center py-2">
                <p class="text-3xl font-bold text-white">PKR ${(totalBudget/1000).toFixed(0)}K</p>
                <p class="text-xs text-gray-500 mt-1">Total monthly retainer</p>
              </div>
              <div class="pt-2 border-t border-gray-800 space-y-2">
                ${clients.slice(0,4).map(c => `
                  <div>
                    <div class="flex justify-between mb-1">
                      <span class="text-xs text-gray-400 truncate">${c.name}</span>
                      <span class="text-xs font-semibold text-white">${(c.budget/1000).toFixed(0)}K</span>
                    </div>
                    <div class="w-full bg-gray-800 rounded-full h-1">
                      <div class="bg-indigo-400 h-1 rounded-full" style="width:${Math.round((c.budget/totalBudget)*100)}%"></div>
                    </div>
                  </div>`).join('')}
              </div>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <!-- Pipeline Status Breakdown -->
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
            <h2 class="text-sm font-semibold text-white mb-4">Pipeline Status Breakdown</h2>
            <div class="space-y-3">
              ${Object.entries(statusCount).map(([status, count]) => {
                const cfg = STATUS_CONFIG[status] || { label: status, color: 'bg-gray-500/15 text-gray-400 border-gray-500/30' };
                const pct = Math.round((count / total) * 100);
                return `
                  <div class="flex items-center gap-3">
                    <div class="w-28 flex-shrink-0">${statusBadge(status)}</div>
                    <div class="flex-1 bg-gray-800 rounded-full h-2">
                      <div class="bg-indigo-500 h-2 rounded-full" style="width:${pct}%"></div>
                    </div>
                    <span class="text-xs font-semibold text-white w-6 text-right">${count}</span>
                  </div>`;
              }).join('')}
            </div>
          </div>

          <!-- Top Clients by Tasks -->
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
            <h2 class="text-sm font-semibold text-white mb-4">Top Clients by Tasks</h2>
            <div class="space-y-3">
              ${topClients.map(([name, count], i) => `
                <div>
                  <div class="flex justify-between mb-1">
                    <div class="flex items-center gap-2">
                      <span class="text-xs text-gray-500">${i+1}.</span>
                      <span class="text-sm text-white">${name}</span>
                    </div>
                    <span class="text-xs font-semibold text-white">${count} tasks</span>
                  </div>
                  <div class="w-full bg-gray-800 rounded-full h-1.5">
                    <div class="bg-indigo-500 h-1.5 rounded-full" style="width:${Math.round((count/maxClientTasks)*100)}%"></div>
                  </div>
                </div>`).join('')}
              ${!topClients.length ? `<p class="text-xs text-gray-600 text-center py-4">No task data yet</p>` : ''}
            </div>
          </div>
        </div>

        <!-- Contract Alerts Table -->
        <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
          <div class="px-5 py-4 border-b border-gray-800">
            <h2 class="text-sm font-semibold text-white">Contract Expiry Tracker</h2>
          </div>
          <table class="data-table">
            <thead><tr><th>Client</th><th>PM</th><th>End Date</th><th>Days Left</th><th>Budget/mo</th><th>Status</th></tr></thead>
            <tbody>
              ${clients.sort((a,b) => new Date(a.endDate) - new Date(b.endDate)).map(c => {
                const days = daysUntil(c.endDate);
                const dClass = days < 0 ? 'text-red-400 font-bold' : days <= 14 ? 'text-red-400 font-semibold' : days <= 30 ? 'text-orange-400' : 'text-gray-400';
                const badge = days < 0 ? '<span class="status-badge bg-red-500/15 text-red-400 border-red-500/30">Expired</span>'
                            : days <= 30 ? '<span class="status-badge bg-orange-500/15 text-orange-400 border-orange-500/30">Ending Soon</span>'
                            : '<span class="status-badge bg-green-500/15 text-green-400 border-green-500/30">Active</span>';
                return `<tr>
                  <td class="font-medium text-white">${c.name}</td>
                  <td class="text-indigo-400">${c.pm}</td>
                  <td>${formatDate(c.endDate)}</td>
                  <td><span class="${dClass}">${days < 0 ? Math.abs(days)+'d ago' : days+'d'}</span></td>
                  <td>PKR ${(c.budget||0).toLocaleString()}</td>
                  <td>${badge}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => { setCurrentDate(); render(); });
  </script>
</body>
</html>
