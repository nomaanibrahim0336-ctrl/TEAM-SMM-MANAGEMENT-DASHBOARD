<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMM-MANAGER — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md px-6">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl bg-indigo-600 flex items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-layer-group text-white text-xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-white">SMM-MANAGER</h1>
      <p class="text-sm text-gray-500 mt-1">Sign in to your workspace</p>
    </div>

    <!-- Login Card -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8">
      <div id="errorMsg" class="hidden mb-4 bg-red-500/10 border border-red-500/30 text-red-400 text-sm px-4 py-3 rounded-lg">
        <i class="fa-solid fa-circle-exclamation mr-2"></i>Invalid email or password
      </div>

      <div class="space-y-5">
        <div>
          <label class="form-label">Email Address</label>
          <div class="relative">
            <i class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input id="loginEmail" type="email" class="form-input pl-10" placeholder="you@smm.com"/>
          </div>
        </div>
        <div>
          <label class="form-label">Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input id="loginPassword" type="password" class="form-input pl-10" placeholder="••••••••"/>
            <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
              <i id="eyeIcon" class="fa-solid fa-eye text-sm"></i>
            </button>
          </div>
        </div>
        <button onclick="handleLogin()" class="btn-primary w-full py-3 text-base">
          <i class="fa-solid fa-right-to-bracket mr-2"></i>Sign In
        </button>
      </div>

      <!-- Demo Accounts -->
      <div class="mt-6 pt-5 border-t border-gray-800">
        <p class="text-xs text-gray-600 text-center mb-3 uppercase tracking-wider">Demo Accounts</p>
        <div class="grid grid-cols-2 gap-2">
          <button onclick="fillDemo('admin@smm.com','admin123')" class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-2 rounded-lg transition-colors text-left">
            <i class="fa-solid fa-shield-halved text-indigo-400 mr-1.5"></i>Admin
          </button>
          <button onclick="fillDemo('noman@smm.com','creator123')" class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-2 rounded-lg transition-colors text-left">
            <i class="fa-solid fa-pen-nib text-blue-400 mr-1.5"></i>Creator
          </button>
          <button onclick="fillDemo('javeria@smm.com','designer123')" class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-2 rounded-lg transition-colors text-left">
            <i class="fa-solid fa-palette text-pink-400 mr-1.5"></i>Designer
          </button>
          <button onclick="fillDemo('zaid@smm.com','pm123')" class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-2 rounded-lg transition-colors text-left">
            <i class="fa-solid fa-user-tie text-green-400 mr-1.5"></i>PM
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script>
    function togglePassword() {
      const input = document.getElementById('loginPassword');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-solid fa-eye-slash text-sm';
      } else {
        input.type = 'password';
        icon.className = 'fa-solid fa-eye text-sm';
      }
    }

    function fillDemo(email, pass) {
      document.getElementById('loginEmail').value = email;
      document.getElementById('loginPassword').value = pass;
    }

    function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPassword').value.trim();
      const team = JSON.parse(localStorage.getItem('smm_team')) || getSampleTeam();
      const user = team.find(u => u.email === email && u.password === pass);
      if (user) {
        localStorage.setItem('smm_user', JSON.stringify(user));
        window.location.href = 'index.html';
      } else {
        document.getElementById('errorMsg').classList.remove('hidden');
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
